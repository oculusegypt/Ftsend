name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: npm run build:core

      - name: Build web (with production signaling URL)
        env:
          VITE_SIGNALING_URL: wss://drop--Sending2.replit.app/signaling?room=public
        run: npm run build:web

      - name: Sync Capacitor
        run: cd packages/mobile && npx cap sync android

      - name: Make Gradle executable
        run: chmod +x packages/mobile/android/gradlew

      - name: Build debug APK
        run: |
          cd packages/mobile/android
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: p2p-drop-debug-apk
          path: packages/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  build-release:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: npm run build:core

      - name: Build web (with production signaling URL)
        env:
          VITE_SIGNALING_URL: wss://drop--Sending2.replit.app/signaling?room=public
        run: npm run build:web

      - name: Sync Capacitor
        run: cd packages/mobile && npx cap sync android

      - name: Make Gradle executable
        run: chmod +x packages/mobile/android/gradlew

      - name: Decode keystore
        if: secrets.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > packages/mobile/android/app/p2pdrop-release.keystore

      - name: Build release AAB (for Play Store)
        env:
          KEYSTORE_FILE: p2pdrop-release.keystore
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          cd packages/mobile/android
          ./gradlew bundleRelease --no-daemon

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: p2p-drop-release-aab
          path: packages/mobile/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
