name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build core
        run: npm run build:core

      - name: Build web
        env:
          VITE_SIGNALING_URL: wss://drop--Sending2.replit.app/signaling?room=public
        run: npm run build:web

      - name: Sync Capacitor
        run: cd packages/mobile && npx cap sync android

      - name: Make Gradle executable
        run: chmod +x packages/mobile/android/gradlew

      - name: Build debug APK
        run: |
          cd packages/mobile/android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: p2p-drop-debug-apk
          path: packages/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
