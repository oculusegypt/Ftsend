name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build core
        run: npm run build:core

      - name: Build web
        env:
          VITE_SIGNALING_URL: wss://drop--Sending2.replit.app/signaling?room=public
        run: npm run build:web

      - name: Sync Capacitor iOS
        run: cd packages/mobile && npx cap sync ios

      - name: Install CocoaPods
        run: |
          cd packages/mobile/ios/App
          pod install --repo-update

      - name: Build iOS (unsigned)
        run: |
          cd packages/mobile/ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build \
            | xcpretty || true

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: p2p-drop-ios-build
          path: packages/mobile/ios/App/build/Build/Products/Release-iphoneos/
          retention-days: 14
